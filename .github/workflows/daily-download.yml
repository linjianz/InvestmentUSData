name: Daily Data Download

permissions:
  contents: write

concurrency:
  group: daily-download-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 0 * * 0-6'  # 周一～周日，00:00 UTC -> 北京时间 08:00 -> GitHub 执行大概 10:30
    - cron: '0 16 * * 0-6'  # 周一～周日，16:00 UTC -> 北京时间 00:00 -> GitHub 执行大概 02:30
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Download data
        env:
          TIINGO_API_KEYS: ${{ secrets.TIINGO_API_KEYS }}
        run: python download.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tickers/
          if [ -d tickers_A股ETF ]; then git add tickers_A股ETF/; fi
          if git diff --staged --quiet; then
            echo "No data changes, skip commit"
          else
            git commit -m "chore: daily data update [skip ci]"
            git push origin HEAD:main
          fi
