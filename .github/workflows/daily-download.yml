name: Daily Data Download

permissions:
  contents: write

concurrency:
  group: daily-download-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    # 周一至五 00:01 UTC（北京时间约 08:01，夏令时约 07:01）
    - cron: '1 0 * * 1-5'
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Download data
        env:
          TIINGO_API_KEYS: ${{ secrets.TIINGO_API_KEYS }}
        run: python download.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tickers/
          if git diff --staged --quiet; then
            echo "No data changes, skip commit"
          else
            git commit -m "chore: daily data update [skip ci]"
            git push origin HEAD:main
          fi
